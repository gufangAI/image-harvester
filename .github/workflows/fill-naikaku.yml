name: fill-naikaku
on:
  workflow_dispatch:
    inputs:
      list_key:
        default: "_worklist/med_fill_tz.csv"
      total:
        default: "1"
jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        shard: [0]
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libvips42 libvips-tools
          pip install -q pyvips boto3 requests pillow opencc
      - name: clone priv
        env:
          P: ${{ secrets.P }}
        run: git clone --depth 1 --quiet https://x-access-token:${P}@github.com/gufangAI/harvester-priv.git _p
      - name: download
        env:
          EDGE_PROXY: https://naikaku-mine.hosonzuo.workers.dev/fetch?url=
          NAIKAKU_ZIP: https://naikaku-mine.hosonzuo.workers.dev
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_KEY: ${{ secrets.R2_KEY }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT }}
          CF_D1_DB: ${{ secrets.CF_D1_DB }}
          CF_D1_TOKEN: ${{ secrets.CF_D1_TOKEN }}
          LIST_BUCKET: ${{ secrets.LIST_BUCKET }}
          DST_BUCKET: guyaofang-lib
          DST_GUJI_BUCKET: guji-sea
          PAGE_WORKERS: "4"
        run: python _p/hv.py --source naikaku --shard ${{ matrix.shard }} --total ${{ github.event.inputs.total }} --list-key "${{ github.event.inputs.list_key }}"
